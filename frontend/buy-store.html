<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我要买店 - 24号电商</title>
    <link rel="stylesheet" href="./assets/app.css">
  </head>
  <body data-page="buy-store">
    <main class="phone-page">
      <header class="page-title">
        <a href="./index.html" aria-label="返回首页">‹</a>
        <strong>我要买店</strong>
        <span></span>
      </header>

      <section class="search">
        <input id="storeSearch" type="search" placeholder="搜索店铺类目 / 等级 / 编号">
      </section>

      <section class="service-icons">
        <a href="./buy-store.html"><b>买</b><span>我要买店</span></a>
        <a href="#" data-consult><b>入</b><span>代入驻</span></a>
        <a href="#" data-consult><b>评</b><span>网店评估</span></a>
        <a href="#" data-consult><b>卖</b><span>我要出售</span></a>
      </section>

      <section class="filter-bar" id="storeFilters">
        <button class="active" data-platform="">全部</button>
        <button data-platform="taobao">淘宝</button>
        <button data-platform="pdd">拼多多</button>
        <button data-platform="tmall">天猫</button>
      </section>

      <section class="store-list" id="storeList">
        <article>
          <small>店铺资源</small>
          <h2>后台还没有新增店铺时，这里会先显示默认内容</h2>
          <div class="price">咨询报价</div>
          <button type="button" data-consult>微信咨询</button>
        </article>
      </section>

      <nav class="bottom-nav">
        <a href="./index.html">首页</a>
        <a class="active" href="./buy-store.html">买店</a>
        <a href="#" data-consult>咨询</a>
        <a href="./my.html">我的</a>
      </nav>
    </main>
    <script src="./assets/app.js"></script>
  </body>
</html>
